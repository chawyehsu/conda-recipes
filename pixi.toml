[workspace]
name = "conda-recipes"
description = "Recipes for chawyehsu's own conda forge"
authors = ["Chawye Hsu <su+git@chawyehsu.com>"]
channels = ["chawyehsu", "conda-forge"]
platforms = ["linux-aarch64", "linux-64", "win-64", "osx-64", "osx-arm64"]
license = "BSD-3-Clause"

[tasks]
# Set env-isolation to none to inherit host environments set in CI
build = "rattler-build build --env-isolation 'none'"

[dependencies]
rattler-build = ">=0.63.1,<0.64"
