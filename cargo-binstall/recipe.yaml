schema_version: 1

context:
  name: cargo-binstall
  version: "1.20.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/cargo-bins/cargo-binstall/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 5eb3e91392589d18e133f5b6e627fee6c17f830b562b316289a67ba9f88d58ac
  patches:
    - if: win and build_platform != target_platform
      then: 0001-cross-compile-rc.patch

build:
  number: 0
  script:
    env:
      # Use cmake to build aws-lc-sys, because conda's CFLAGS inject -O2 which
      # overrides the -O0 required by jitterentropy-base.c, causing a build failure.
      AWS_LC_SYS_CMAKE_BUILDER: "1"
    content:
      - if: win
        then: | # Avoid Windows path-length issue breaking Cmake/Cargo
          for %%I in ("%SRC_DIR%") do set DRIVE_LETTER=%%~dI
          set "CARGO_TARGET_DIR=%DRIVE_LETTER%\cd"
          set "CARGO_HOME=%DRIVE_LETTER%\ch"
      - cargo auditable install --locked --root ${{ PREFIX }} --path crates/bin --no-track
      - cargo-bundle-licenses --format yaml --output ${{ SRC_DIR }}/THIRDPARTY.yml

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("rust") }}
    - cargo-auditable
    - cargo-bundle-licenses
    - cmake
    - if: osx
      # ld64 is needed otherwise below error raises:
      # ld: -lto_library library filename must be 'libLTO.dylib'
      then: ld64

tests:
  - script:
      - if: build_platform == target_platform
        then: cargo-binstall -V

about:
  homepage: https://github.com/cargo-bins/cargo-binstall
  license: GPL-3.0-only
  license_file:
    - crates/bin/LICENSE
    - THIRDPARTY.yml
  summary: Binary installation for rust projects
  description: |
    Binstall provides a low-complexity mechanism for installing Rust binaries
    as an alternative to building from source (via cargo install) or manually
    downloading packages
  repository: https://github.com/cargo-bins/cargo-binstall

extra:
  recipe-maintainers:
    - chawyehsu
