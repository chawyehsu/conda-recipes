name: CICD

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Package names to build (optional, comma separated)'
        required: false
        default: ''
      release:
        description: 'Trigger release workflow (optional, boolean)'
        required: false
        type: boolean
        default: false
  push:
  pull_request:

jobs:
  ci_check:
    name: Check
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.should_build.outputs.should_build }}
      changed_dirs: ${{ steps.should_build.outputs.changed_dirs }}
    steps:
    - name: Checkout Source
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.head_ref }}

    - name: Changed Files
      id: changed_files
      uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
      with:
        dir_names: true
        dir_names_exclude_current_dir: true
        dir_names_max_depth: '1'
        separator: ","

    - name: Should Build
      id: should_build
      env:
        CHANGED_FILES: ${{ steps.changed_files.outputs.all_changed_files }}
        PACKAGES: ${{ github.event.inputs.packages }}
      shell: pwsh
      run: |
        $changed_dirs = $env:CHANGED_FILES -split ','
        Write-Host "Changed directories: $changed_dirs"
        $changed_dirs = $changed_dirs | Where-Object {
          -not $_.StartsWith('.') -and (Test-Path -Path "$_/recipe.yaml")
        }
        Write-Host "Changed packages: $changed_dirs"
        if (-not $changed_dirs -and $env:PACKAGES) {
          $changed_dirs = $env:PACKAGES -split ','
          Write-Host "Using workflow_dispatch packages: $changed_dirs"
        }
        if ($changed_dirs) {
          $changed_dirs = $changed_dirs -join ','
          Write-Host "should_build: true"
          Write-Host "changed_dirs: $changed_dirs"
          echo "should_build=true" >> $env:GITHUB_OUTPUT
          echo "changed_dirs=$changed_dirs" >> $env:GITHUB_OUTPUT
        }

  ci_matrix:
    name: Generate Matrix
    needs: ci_check
    runs-on: ubuntu-latest
    if: needs.ci_check.outputs.should_build == 'true'
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - name: Checkout Source
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.head_ref }}
        fetch-depth: 1

    - name: Set Matrix
      id: set-matrix
      env:
        CHANGED_DIRS: ${{ needs.ci_check.outputs.changed_dirs }}
      shell: pwsh
      run: |
        $matrixInclude = @()
        $changed_dirs = $env:CHANGED_DIRS -split ','
        foreach ($dir in $changed_dirs) {
          # Check matrix.json, use default matrix and skip if not found
          # default matrix file located at .github/matrix.json
          $matrixPath = Join-Path -Path $dir -ChildPath "matrix.json"
          if (-not (Test-Path -Path $matrixPath)) {
            Write-Host "No matrix.json found for $dir, using default matrix."
            # Add all targets from default matrix
            $defaultMatrixPath = Get-Content -Path ".github/matrix.json" | Out-String | ConvertFrom-Json
            $matrixInclude = $defaultMatrixPath.include
            break
          } else {
            $matrixContent = Get-Content -Path $matrixPath | Out-String | ConvertFrom-Json
            if (-not $matrixContent.include) {
              continue
            }
            $matrixInclude = $matrixInclude + $matrixContent.include
          }
        }
        if ($matrixInclude.Count -gt 0) {
          # Remove duplicates from matrixInclude
          $matrixInclude = $matrixInclude | Select-Object -Unique -Property target,os
          if ($matrixInclude.Count -eq 1) {
            $matrixInclude = ,$matrixInclude
          }
          $matrixJson = @{ include = $matrixInclude } | ConvertTo-Json -Compress
          Write-Host "matrix: $matrixJson"
          echo "matrix=$matrixJson" >> $env:GITHUB_OUTPUT
        }

  ci_build:
    name: Build
    needs: [ci_check, ci_matrix]
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.ci_matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    if: needs.ci_check.outputs.should_build == 'true'
    outputs:
      pattern: ${{ steps.run_build.outputs.pattern }}
    steps:
    - name: Checkout Source
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.head_ref }}
        fetch-depth: 1

    - name: Setup Pixi
      uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
      with:
        cache: true

    - name: Run Build
      id: run_build
      env:
        CHANGED_FILES: ${{ needs.ci_check.outputs.changed_dirs }}
      shell: pwsh
      run: |
        function Assert-LastExitCode([string]$Context) {
          if ($LASTEXITCODE -ne 0) {
            Write-Error "$Context failed with exit code $LASTEXITCODE."
            exit $LASTEXITCODE
          }
        }

        $target = '${{ matrix.target }}'
        $changed_dirs = $env:CHANGED_FILES -split ','
        foreach ($dir in $changed_dirs) {
          # Check matrix.json and skip if target not found
          $matrixPath = Join-Path -Path $dir -ChildPath "matrix.json"
          if (Test-Path -Path $matrixPath) {
            $matrixContent = Get-Content -Path $matrixPath | Out-String | ConvertFrom-Json
            $shouldTriggerBuild = $false
            foreach ($entry in $matrixContent.include) {
              if ($entry.target -eq $target -and $entry.os -eq "${{ matrix.os }}") {
                $shouldTriggerBuild = $true
                Write-Host "Explicit build $dir for target $target on OS runner ${{ matrix.os }}" -ForegroundColor Cyan
                break
              }
            }
            if (-not $shouldTriggerBuild) {
              Write-Host "Skipping $dir for target $target on OS runner ${{ matrix.os }}" -ForegroundColor Yellow
              continue
            }
          }

          # Common build arguments
          $buildArgs = @(
            '--log-style','plain',
            '--extra-meta', "flow_run_id=github_$env:GITHUB_RUN_ID",
            '--extra-meta', "remote_url=https://github.com/$env:GITHUB_REPOSITORY",
            '--extra-meta', "sha=$env:GITHUB_SHA",
            '-c','conda-forge',
            '-c','chawyehsu'
          )

          $collectedDeps = @()
          function Build-UnpublishedDependency([string]$depPkgName) {
            $unpublishedDepsPath = Join-Path -Path $depPkgName -ChildPath "_deps.json"
            if (Test-Path -Path $unpublishedDepsPath) {
              $deps = @(Get-Content -Raw -Path $unpublishedDepsPath | ConvertFrom-Json)
              foreach ($dep in $deps) {
                if ($dep.targets -and -not ($dep.targets -contains $target)) {
                  Write-Host "Skipping dependency $($dep.name) for target $target" -ForegroundColor Yellow
                  continue
                }

                if ($collectedDeps -contains $dep.name) {
                  Write-Host "Already built dependency $($dep.name), skipping." -ForegroundColor Green
                  continue
                }

                # Recursive build for unpublished dependencies
                Build-UnpublishedDependency $dep.name

                $buildDepArgs = $buildArgs
                if ($dep.type -eq 'build') {
                  Write-Host "Building unpublished build-phase dependency $($dep.name) for $depPkgName..." -ForegroundColor Blue
                } else {
                  Write-Host "Building unpublished dependency $($dep.name) for $depPkgName..." -ForegroundColor Blue
                  $buildDepArgs = $buildArgs + @('--target-platform', $target)
                }
                pixi run build --recipe-dir $dep.name @buildDepArgs
                Assert-LastExitCode "Dependency build $($dep.name)"
                $collectedDeps += $dep.name
              }
            }
          }

          # Build unpublished dependencies if any
          Build-UnpublishedDependency $dir

          Write-Host "Building $dir..." -ForegroundColor Magenta
          $packageArgs = $buildArgs + @('--target-platform', $target)
          pixi run build --recipe-dir $dir @packageArgs
          Assert-LastExitCode "Package build $dir"
        }

        # Generate glob pattern for artifact upload based on changed package names
        $pattern = "[$($changed_dirs -join ',')]"
        Write-Host "Pattern for artifact upload: $pattern"
        echo "pattern=$pattern" >> $env:GITHUB_OUTPUT

    - name: Upload Artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ matrix.os }}-${{ matrix.target }}-builds
        path: |
          ./output/${{ matrix.target }}/${{ steps.run_build.outputs.pattern }}*.conda

  cd_release:
    name: Release
    needs: [ci_check, ci_build]
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'release')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true') }}
    permissions:
      # Trusted publishing
      id-token: write
      # Attestations store
      attestations: write
    steps:
    - name: Checkout Source
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.head_ref }}
        fetch-depth: 1

    - name: Setup Pixi
      uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
      with:
        cache: true

    - name: Download Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: uploads
        merge-multiple: true

    - name: Publish
      env:
        # Anaconda
        ANACONDA_OWNER: chawyehsu
        ANACONDA_API_KEY: ${{ secrets.ANACONDA_API_KEY }}
        # Prefix.dev
        PREFIX_CHANNEL: chawyehsu
        CHANGED_PACKAGES: ${{ needs.ci_check.outputs.changed_dirs }}
        # For attestation storage
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh
      run: |
        if (-not $env:ANACONDA_API_KEY -or $env:ANACONDA_API_KEY -eq '') {
          Write-Error "ANACONDA_API_KEY is not set."
          exit 1
        }
        function Assert-LastExitCode([string]$Context) {
          if ($LASTEXITCODE -ne 0) {
            Write-Error "$Context failed with exit code $LASTEXITCODE."
            exit $LASTEXITCODE
          }
        }
        if ($env:CHANGED_PACKAGES) {
          $allFiles = @()
          $env:CHANGED_PACKAGES -split ',' | ForEach-Object {
            $files = Get-ChildItem -Path "./uploads/*/$_*.conda"
            if ($files.Count) {
              Write-Host "Collected $($files.Count) files for package $_"
              $allFiles += $files
            }
          }

          if ($allFiles.Count) {
            $paths = $allFiles | ForEach-Object { $_.FullName }
            Write-Host "Publishing $($allFiles.Count) files:"
            $paths | ForEach-Object { Write-Host "- $_" }
            pixi run rattler-build upload --log-style plain anaconda @paths
            Assert-LastExitCode "Anaconda upload"
            pixi run rattler-build upload --log-style plain prefix @paths `
              --generate-attestation --store-github-attestation --skip-existing
            Assert-LastExitCode "Prefix upload"
          }
        }
