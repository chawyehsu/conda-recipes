schema_version: 1

context:
  name: mihoro
  version: "0.11.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/spencerwooo/mihoro/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 0dffdfa366089b3ee54d278bb297696d94c1e053441b13e6b1384cd8aa306310
    patches:
    - if: osx
      then:
        - 0001-feat-macos-support.patch

build:
  number: 1
  skip:
    - win
  script:
    # Disable `self_update` feature for conda variant builds
    - cargo install --locked --root ${{ PREFIX }} --path . --no-track --no-default-features

requirements:
  build:
    - ${{ compiler("rust") }}

tests:
  - script:
    - if: build_platform == target_platform
      then: mihoro -V

about:
  homepage: https://github.com/spencerwooo/mihoro
  license: MIT
  license_file: LICENSE
  summary: Mihomo CLI client, no more, no less
  description: Mihomo CLI client, no more, no less
  repository: https://github.com/spencerwooo/mihoro

extra:
  recipe-maintainers:
    - chawyehsu
